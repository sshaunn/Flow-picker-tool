# Flow page selectors and exception phrases.
#
# Captured against https://labs.google/fx/tools/flow/project/<id> on
# 2026-04-28 with the Video tab active (Veo 3.1 Fast, 9:16, x1, 8s).
# Re-run the discover snippet whenever Flow ships a new build.
#
# Notes for whoever updates this file:
#   * sc-* class hashes change between Flow deploys — DO NOT use them.
#     Prefer role/data-state/aria-label or the radix data-radix-collection-item.
#   * radix-:rXX: ids are dynamic per page load — also unsafe.
#   * The Slate.js prompt editor is a contenteditable div, not a textarea —
#     the Playwright adapter knows to use keyboard.type() for it.

entry_url_pattern: "https://labs.google/fx/tools/flow"
account_language: "en-US"

state_phrases:
  unusual_activity:
    # Be specific: the lone "unusual activity" word fragment shows up in
    # Google's help links / footer / privacy notices and would false-match
    # any page that has those. Use the full sentence Google's risk system
    # actually serves when an account is flagged.
    #
    # Removed (false-positive culprits — ALWAYS present in normal Flow UI):
    #   * "Please visit the help center for more information" — appears
    #     in safety/footer text on every page; matched even on healthy
    #     accounts mid-generation, sending the WS to cooldown when the
    #     account was actually fine. Confirmed by manual generation
    #     working immediately after ``error_type=unusual_activity``.
    #   * "Verify it's you" — already covered by captcha_or_verification
    #     and appears on Google account helper links unrelated to bans.
    - "We've detected unusual activity"
    - "we've detected unusual activity"
    - "We noticed some unusual activity"  # Flow's per-generation flag
    - "we noticed some unusual activity"
    - "Unusual activity from your computer network"
    # Per-account soft rate limit: Flow flashes a "Failed" card with
    # this exact text and a retry button. Account isn't banned — a
    # short wait + retry works. Bucketing into unusual_activity reuses
    # the strike system's tiered cooldowns (first hit = 5 min, exactly
    # what "wait a moment" is asking for); the worker moves on to
    # another account during that window.
    - "You're requesting generations too quickly"
    - "you're requesting generations too quickly"
    - "requesting generations too quickly"
  login_required:
    - "Use your Google Account"
    - "Sign in - Google Accounts"
  captcha_or_verification:
    - "I'm not a robot"
    - "verify it's you"
    - "Confirm it's you"
  page_load_failed:
    - "this page isn't working"
    - "ERR_CONNECTION"
    - "Aw, snap"
  # Account-level access denial. Match Flow's full takeover sentence
  # specifically — earlier shorter variants ("don't have access to
  # Flow") false-matched help-center hover cards and hidden tooltips
  # on accounts that DID work, dragging them into manual_check.
  # The full sentence ("It looks like you don't have access to Flow.")
  # only appears on the actual lockout page.
  no_flow_access:
    - "It looks like you don't have access to Flow"
    - "It looks like you do not have access to Flow"
  # Flow service-level rate limit / overload. NOT a workstation-specific issue —
  # treat it as a transient page failure and back off; do not flip to manual_check.
  service_unavailable:
    - "Flow is experiencing high demand"
    - "Please try again in a few minutes"
    - "We're experiencing high demand"
    - "Service is temporarily unavailable"
    - "Quota exceeded"

  # Per-generation transient failure — Flow's optional audio sub-model
  # failed. The video model itself is fine, the workstation is fine, the
  # account is fine. Recovery: open Flow settings → toggle "Generate
  # silent videos" → click Generate again. The worker handles this in
  # ``_handle_audio_failure_recovery`` (TODO once settings DOM mapped).
  generation_retryable:
    - "Audio generation failed"
    - "Please try a different prompt or send feedback"
    - "you have not been charged for this generation"
    - "return silent videos"

selectors:
  # Slate.js editor; the adapter focuses then types via keyboard.
  prompt_input: '[role="textbox"][data-slate-editor="true"]'

  # Legacy hidden <input type="file"> that goes to "Add Media" / Ingredients
  # reference list — uploads here are NOT attached to the prompt and Flow
  # routes the request through the image-only model (Nano Banana). Kept
  # for back-compat / mock tests; the production worker uses the
  # prompt_attach_* path below.
  upload_button: 'input[type="file"]'

  # ── Prompt-attach upload (the right path for "image is part of the prompt")
  # Click the small "+" button next to the prompt → opens a picker dialog
  # with an "Upload image" entry → clicking that triggers the OS file
  # chooser. Once chosen, the image becomes a chip inside the prompt and
  # Flow routes the request through Veo (video model).
  prompt_attach_button: 'button[data-state]:has-text("add_2")'
  prompt_attach_dialog: '[role="dialog"][data-state="open"]'

  # ── Multilingual selector lists.
  # Flow translates UI text based on Chrome's locale. Customer accounts
  # span all of EAS / SEA, so a single "Upload image" / "Start" / "End"
  # selector silently times out the moment the operator's account is on
  # any non-English locale. Each list below covers the languages we've
  # seen in customer logs PLUS the rest of EAS+SEA pre-emptively.
  #
  # Order: English first (still the most common), then Chinese variants,
  # then SEA, then JA/KO. The adapter tries each in order; first match
  # wins. On total failure it dumps every visible button's text into
  # the log so an unknown locale can be added on the next pass.
  #
  # `text="..."` is Playwright's exact-match (case-insensitive) syntax.
  # Quote variants matter: ``text="Start"`` differs from ``text=Start``.
  # We keep the exact-match form to avoid "Start" matching "Restart".
  #
  # Source: Google's own translations of Material UI strings + Flow
  # screenshots from customer diagnostic bundles.
  prompt_attach_upload_target:
    - 'text="Upload image"'             # en
    - 'text="上传图片"'                   # zh-CN
    - 'text="上傳圖片"'                   # zh-TW
    - 'text="Tải lên hình ảnh"'          # vi (Vietnamese)
    - 'text="Tải hình ảnh lên"'          # vi alternate
    - 'text="อัปโหลดรูปภาพ"'              # th (Thai)
    - 'text="Unggah gambar"'             # id (Indonesian)
    - 'text="Muat naik imej"'            # ms (Malay)
    - 'text="Mag-upload ng larawan"'     # tl/fil (Filipino)
    - 'text="ဓာတ်ပုံတင်ရန်"'              # my (Burmese)
    - 'text="បង្ហោះរូបភាព"'                # km (Khmer)
    - 'text="ອັບໂຫລດຮູບພາບ"'             # lo (Lao)
    - 'text="画像をアップロード"'          # ja
    - 'text="이미지 업로드"'              # ko

  # Frames sub-tab variant: in Frames mode the "+" button is replaced
  # by two named slots, "Start" and "End", flanking a swap-arrow icon.
  # Each opens the same picker dialog as ingredients ("Upload image"),
  # so reuse ``prompt_attach_dialog`` + ``prompt_attach_upload_target``
  # for the inner flow.
  prompt_attach_button_start:
    - 'text="Start"'                     # en
    - 'text="开始"'                       # zh-CN
    - 'text="開始"'                       # zh-TW / ja
    - 'text="Bắt đầu"'                    # vi
    - 'text="เริ่มต้น"'                    # th
    - 'text="เริ่ม"'                       # th alternate
    - 'text="Mulai"'                      # id
    - 'text="Mula"'                       # ms
    - 'text="Simulan"'                    # tl/fil
    - 'text="စတင်"'                       # my
    - 'text="ចាប់ផ្ដើម"'                   # km
    - 'text="ເລີ່ມຕົ້ນ"'                   # lo
    - 'text="시작"'                       # ko
  prompt_attach_button_end:
    - 'text="End"'                       # en
    - 'text="结束"'                       # zh-CN
    - 'text="結束"'                       # zh-TW
    - 'text="Kết thúc"'                   # vi
    - 'text="สิ้นสุด"'                     # th
    - 'text="Akhiri"'                     # id
    - 'text="Selesai"'                    # id alternate
    - 'text="Tamat"'                      # ms
    - 'text="Tapusin"'                    # tl/fil
    - 'text="ပြီးဆုံး"'                    # my
    - 'text="បញ្ចប់"'                      # km
    - 'text="ສິ້ນສຸດ"'                     # lo
    - 'text="終了"'                       # ja
    - 'text="종료"'                       # ko

  # The "Create" button with the arrow_forward Material Symbol.
  # The other on-page "Create" is the model-picker (icon: add_2).
  # Generate / Create submit button. ``arrow_forward`` is the Material
  # Symbols ligature (locale-independent), so the FIRST entry is the
  # safest — it discriminates the submit button from any other ``Create``
  # button on the page (e.g. "+ New project" sometimes also reads as
  # "Create"). The remaining entries are language-specific fallbacks
  # for cases where the page mounts another arrow_forward icon and we
  # need the text to disambiguate. Order: icon-only → en → zh / SEA /
  # JA / KO. The adapter tries each and falls back on timeout; on total
  # failure ``_dump_visible_button_texts`` writes every visible button
  # label to app.log AND the task error_message so the operator sees
  # exactly what locale we missed.
  generate_button:
    - 'button:has-text("arrow_forward")'                      # icon-only (locale-free)
    - 'button:has-text("arrow_forward"):has-text("Create")'   # en
    - 'button:has-text("arrow_forward"):has-text("创建")'      # zh-CN
    - 'button:has-text("arrow_forward"):has-text("建立")'      # zh-TW
    - 'button:has-text("arrow_forward"):has-text("Tạo")'       # vi
    - 'button:has-text("arrow_forward"):has-text("สร้าง")'      # th
    - 'button:has-text("arrow_forward"):has-text("Buat")'      # id / ms
    - 'button:has-text("arrow_forward"):has-text("Cipta")'     # ms alternate
    - 'button:has-text("arrow_forward"):has-text("Gumawa")'    # tl/fil
    - 'button:has-text("arrow_forward"):has-text("ဖန်တီး")'     # my
    - 'button:has-text("arrow_forward"):has-text("បង្កើត")'     # km
    - 'button:has-text("arrow_forward"):has-text("ສ້າງ")'       # lo
    - 'button:has-text("arrow_forward"):has-text("作成")'      # ja
    - 'button:has-text("arrow_forward"):has-text("만들기")'    # ko

  # Each candidate is rendered as a <video> inside Flow's virtualized list.
  # The Playwright adapter snapshots video src URLs *before* clicking
  # Create, then collects the URLs that newly appear after — this avoids
  # treating historical project videos as fresh candidates.
  candidate_items: 'div[data-testid="virtuoso-item-list"] video'

  # Flow exposes the actual media URL via a tRPC redirect endpoint on the
  # video's ``src`` attribute. The adapter fetches that URL with the
  # logged-in browser context (cookies attached) — it does *not* click a
  # download button, since Flow doesn't have a stable per-card download
  # control. This regex defines what counts as a "real" candidate src.
  candidate_src_pattern: 'media\.getMediaUrlRedirect'

  # Legacy/unused fields kept so existing tests load without errors. The
  # Playwright adapter no longer relies on these; remove once test mocks
  # are migrated.
  generation_complete_marker: '[data-testid="virtuoso-item-list"]'
  candidate_download_button: 'video'

# Selectors used by ``_apply_flow_mode()`` to force the project UI into a
# known state at the start of every run. Each entry is best-effort; if the
# DOM moves the adapter logs a warning and continues.
mode_controls:
  # The "settings summary" trigger button: shows current model + aspect
  # + output count (e.g. "🍌 Nano Banana 2 / crop_16_9 / x2"). Clicking
  # it opens the panel where mode tabs (Video/Image, Frames/Ingredients,
  # 9:16, x1-x4, 4s-8s, model picker) live. The panel is closed by
  # default on a fresh page load, so we open it before applying preset.
  settings_trigger:
    # Most reliable: every aspect-ratio token starts with "crop_". The
    # settings trigger button always shows mode + aspect + count summary,
    # so it always contains a crop_* token.
    - 'button[data-state]:has-text("crop_")'
    # Fallbacks if Flow ever ships a layout that drops the aspect token.
    - 'button[data-state]:has-text("Veo")'
    - 'button[data-state]:has-text("Nano Banana")'
    - 'button[data-state]:has-text("Imagen")'
    - 'button[data-state]:has-text("Gemini")'
  # Top-level Image / Video toggle.
  tab_video: 'button[role="tab"][id$="-trigger-VIDEO"]'
  tab_image: 'button[role="tab"][id$="-trigger-IMAGE"]'

  # Sub-tabs inside Video mode.
  subtab_ingredients: 'button[role="tab"][id$="-trigger-VIDEO_REFERENCES"]'
  subtab_frames: 'button[role="tab"][id$="-trigger-VIDEO_FRAMES"]'

  # Aspect ratio tabs.
  aspect_9_16: 'button[role="tab"][id$="-trigger-PORTRAIT"]'
  aspect_16_9: 'button[role="tab"][id$="-trigger-LANDSCAPE"]'
  aspect_1_1: 'button[role="tab"][id$="-trigger-SQUARE"]'

  # Output count + duration tabs are disambiguated by visible text + id
  # suffix. We try multiple shapes because Flow's panel sometimes lazy-
  # mounts the output count strip after the duration strip — using both
  # text and id-suffix selectors means we still find it when the text
  # variant alone times out.
  output_count_template: 'button[role="tab"]:has-text("x{N}"), button[role="tab"][id$="-trigger-{N}"]'
  duration_template: 'button[role="tab"]:has-text("{S}s"), button[role="tab"][id$="-trigger-{S}"]'

  # Model picker. Flow renders the model name + an ``arrow_drop_down``
  # ligature inside the same trigger button. Once clicked, a radix
  # DropdownMenu opens with model options as ``[role="menuitem"]``.
  model_dropdown_button: 'button:has-text("arrow_drop_down")'
  # Any of these substrings inside ``model_dropdown_button`` text means we
  # have found the model picker (vs. an unrelated dropdown elsewhere).
  model_keywords:
    - "Veo"
    - "Imagen"
    - "Nano Banana"
    - "Gemini"
  model_menu_item_template: '[role="menuitem"]:has-text("{NAME}")'

timeouts:
  page_action: 60
  generation_complete: 600
  download: 120

# Buttons to click if they appear on page open. Flow shows agreement
# / TOS modals before letting paid models be used; cookie banners may
# also appear after a fresh login. Selectors are tried in order; the first
# *visible* match is clicked. Best-effort — none required.
#
# Translations span EN + zh-CN/TW + EAS/SEA. Customer's Flow privacy
# notice on Vietnamese chrome reads "Tôi đồng ý" / "Tôi hiểu rồi", so
# the English-only list let the modal block subsequent clicks.
popup_dismiss_buttons:
  # ── EN (priority — most accounts see English at first launch).
  - 'div[role="dialog"] button:has-text("I agree")'
  - 'div[role="dialog"] button:has-text("Agree")'
  - 'div[role="dialog"] button:has-text("Accept")'
  - 'div[role="dialog"] button:has-text("Continue")'
  - 'div[role="dialog"] button:has-text("Got it")'
  - 'div[role="dialog"] button:has-text("OK")'
  - 'div[role="dialog"] button:has-text("Confirm")'
  - 'div[role="dialog"] button:has-text("Get started")'
  # ── zh
  - 'div[role="dialog"] button:has-text("我同意")'
  - 'div[role="dialog"] button:has-text("同意")'
  - 'div[role="dialog"] button:has-text("接受")'
  - 'div[role="dialog"] button:has-text("继续")'
  - 'div[role="dialog"] button:has-text("繼續")'
  - 'div[role="dialog"] button:has-text("知道了")'
  - 'div[role="dialog"] button:has-text("我知道了")'
  - 'div[role="dialog"] button:has-text("确定")'
  - 'div[role="dialog"] button:has-text("確定")'
  - 'div[role="dialog"] button:has-text("开始使用")'
  # ── vi
  - 'div[role="dialog"] button:has-text("Tôi đồng ý")'
  - 'div[role="dialog"] button:has-text("Đồng ý")'
  - 'div[role="dialog"] button:has-text("Tiếp tục")'
  - 'div[role="dialog"] button:has-text("Đã hiểu")'
  - 'div[role="dialog"] button:has-text("Tôi hiểu rồi")'
  - 'div[role="dialog"] button:has-text("Bắt đầu")'
  # ── th
  - 'div[role="dialog"] button:has-text("ฉันยอมรับ")'
  - 'div[role="dialog"] button:has-text("ยอมรับ")'
  - 'div[role="dialog"] button:has-text("ตกลง")'
  - 'div[role="dialog"] button:has-text("ดำเนินการต่อ")'
  - 'div[role="dialog"] button:has-text("เข้าใจแล้ว")'
  # ── id / ms
  - 'div[role="dialog"] button:has-text("Saya setuju")'
  - 'div[role="dialog"] button:has-text("Setuju")'
  - 'div[role="dialog"] button:has-text("Lanjutkan")'
  - 'div[role="dialog"] button:has-text("Teruskan")'
  - 'div[role="dialog"] button:has-text("Mengerti")'
  - 'div[role="dialog"] button:has-text("Faham")'
  # ── tl/fil
  - 'div[role="dialog"] button:has-text("Sumasang-ayon ako")'
  - 'div[role="dialog"] button:has-text("Magpatuloy")'
  - 'div[role="dialog"] button:has-text("OK na")'
  # ── ja / ko
  - 'div[role="dialog"] button:has-text("同意します")'
  - 'div[role="dialog"] button:has-text("続行")'
  - 'div[role="dialog"] button:has-text("わかりました")'
  - 'div[role="dialog"] button:has-text("동의")'
  - 'div[role="dialog"] button:has-text("계속")'
  - 'div[role="dialog"] button:has-text("확인")'
  # ── EN: skip / dismiss CTAs (no-thanks variants)
  - 'div[role="dialog"] button:has-text("Skip")'
  - 'div[role="dialog"] button:has-text("Maybe later")'
  - 'div[role="dialog"] button:has-text("No thanks")'
  # ── Cookie banners (locale-independent aria-label pattern + EN text).
  - 'button[aria-label*="ccept" i]'
  - 'button:has-text("Accept all")'
  # ── Radix AlertDialog action button (text-free fallback).
  - '[role="alertdialog"] button:not([aria-label*="ancel" i]):not(:has-text("Cancel"))'
