generation:
  max_round_per_task: 20
  max_retry_count: 2
  page_action_timeout_sec: 60
  generation_wait_timeout_sec: 600

cooldown:
  consecutive_failure_threshold: 3
  cooldown_duration_short_min: 30
  cooldown_duration_long_min: 60
  page_failure_window_min: 5
  page_failure_threshold: 3
  # ↓ 加这行：第一 tier 5 min（默认 30）
  unusual_activity_strike_cooldown_minutes: [5, 15, 60, 180]

flow:
  # Real Flow tool URL (confirmed by following Flow's own redirect chain).
  # ``labs.google/flow`` is the marketing page; the actual generation app
  # lives at /fx/tools/flow.
  entry_url: "https://labs.google/fx/tools/flow"

recovery:
  # How long a task can sit in ``status='running'`` before mid-loop
  # zombie recovery flips it to ``retry_waiting``. Process-boot
  # cleanup (reset_zombie_state_on_startup) handles the common
  # restart case immediately, so this knob only covers in-process
  # worker hangs (Chrome unresponsive, OS scheduling stalls). 5
  # minutes is a balance — long enough that a slow ~3min round
  # doesn't trip it, short enough that a hung worker frees the WS
  # without forcing a full restart.
  running_stale_minutes: 5
  zombie_recovery_limit: 3

output_root: "./output"
db_path: "./flow_harvester.sqlite"
log_root: "./logs"
