{% from "_macros.html" import task_status_badge, progress_bar %}
{# Frequently-changing status + progress block. Pushed via /ws/task/{id}
   every push_interval_sec. Deliberately excludes the <video> grid so
   the WS swap doesn't tear down a clip the customer is previewing. #}

{% set is_resumable = task.status in ('retry_waiting', 'failed', 'download_failed', 'manual_review') %}
{% set retry_exhausted = task.retry_count >= task.max_retry_count and task.status == 'retry_waiting' %}

<section class="bg-white rounded-lg border border-slate-200 p-5 mb-6">
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <h2 class="text-base font-semibold">状态</h2>
      {{ task_status_badge(task.status) }}
      {% if retry_exhausted %}
        <span class="text-xs text-amber-700 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded">
          重试已用尽
        </span>
      {% endif %}
    </div>
    {% if is_resumable %}
      <button hx-post="/api/tasks/{{ task.task_id }}/resume"
              hx-confirm="继续这个任务？已下载的视频会保留，调度器会接着采集到 {{ task.target_count }} 个为止。"
              hx-swap="none"
              class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">
        继续任务
      </button>
    {% endif %}
  </div>
  <div class="mb-4">{{ progress_bar(task.downloaded_count, task.target_count) }}</div>
  <dl class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-3 text-sm">
    <div>
      <dt class="text-xs text-slate-500">SKU / 创意 / 片段</dt>
      <dd class="mt-0.5">{{ task.sku_id }} / {{ task.creative_id }} / {{ task.segment_id }}</dd>
    </div>
    <div>
      <dt class="text-xs text-slate-500">分配账号</dt>
      <dd class="mt-0.5">
        {% if task.assigned_workstation_id %}
          <a href="/workstations/{{ task.assigned_workstation_id }}" class="text-blue-600 hover:underline">{{ task.assigned_workstation_id }}</a>
        {% else %}
          <span class="text-slate-500">—</span>
        {% endif %}
      </dd>
    </div>
    <div>
      <dt class="text-xs text-slate-500">轮数 / 重试</dt>
      <dd class="mt-0.5 tabular-nums">{{ task.generation_round_count }} 轮 · {{ task.retry_count }}/{{ task.max_retry_count }} 次重试</dd>
    </div>
    <div>
      <dt class="text-xs text-slate-500">创建时间</dt>
      <dd class="mt-0.5 text-xs text-slate-700">{{ task.created_at }}</dd>
    </div>
    {% if task.depends_on_task_id %}
    <div class="sm:col-span-2">
      <dt class="text-xs text-slate-500">依赖任务</dt>
      <dd class="mt-0.5">
        <a href="/tasks/{{ task.depends_on_task_id }}" class="text-blue-600 hover:underline font-mono text-xs">
          {{ task.depends_on_task_id }}
        </a>
      </dd>
    </div>
    {% endif %}
    {% if task.flow_mode %}
    <div class="sm:col-span-2">
      <dt class="text-xs text-slate-500">本任务覆盖参数</dt>
      <dd class="mt-0.5 text-xs text-slate-700">
        {%- set parts = [] -%}
        {%- if task.flow_mode.model %}{% set _ = parts.append('模型=' ~ task.flow_mode.model) %}{% endif -%}
        {%- if task.flow_mode.output_count %}{% set _ = parts.append('输出数=' ~ task.flow_mode.output_count) %}{% endif -%}
        {%- if task.flow_mode.duration_sec %}{% set _ = parts.append('时长=' ~ task.flow_mode.duration_sec ~ '秒') %}{% endif -%}
        {%- if task.flow_mode.aspect %}{% set _ = parts.append('比例=' ~ task.flow_mode.aspect) %}{% endif -%}
        {%- if task.flow_mode.tab %}{% set _ = parts.append('主类型=' ~ task.flow_mode.tab) %}{% endif -%}
        {%- if task.flow_mode.subtab %}{% set _ = parts.append('子类型=' ~ task.flow_mode.subtab) %}{% endif -%}
        {{ parts | join(' · ') if parts else '无' }}
      </dd>
    </div>
    {% endif %}
    {% if task.error_type %}
    {% set friendly = task_error_friendly(task.error_type) %}
    <div class="sm:col-span-2">
      <dt class="text-xs text-slate-500">最近错误</dt>
      <dd class="mt-0.5 px-3 py-2 bg-red-50 text-red-800 text-xs rounded border border-red-200">
        <div class="font-medium">{{ friendly[0] if friendly else task.error_type }}</div>
        {% if friendly and friendly[1] %}
          <div class="mt-1 text-red-700">建议：{{ friendly[1] }}</div>
        {% endif %}
        {# Show error_message at readable size on its own line so the
           operator can see locale / forensic dumps without squinting.
           Multi-line / long messages wrap; pre-wrap preserves the
           "visible buttons: A | B | C" formatting from the worker. #}
        {% if task.error_message and task.error_message != task.error_type %}
        <div class="mt-2 text-red-700 whitespace-pre-wrap break-words">
          {{ task.error_message }}
        </div>
        {% endif %}
        <div class="mt-1 text-red-500/70 text-[10px]" title="技术错误码（开发者排查用）">
          {{ task.error_type }}
        </div>
      </dd>
    </div>
    {% endif %}
  </dl>
</section>
