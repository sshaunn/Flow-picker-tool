{% extends "base.html" %}
{% block title %}{{ task.task_id }} · Flow Harvester{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <div>
    <a href="/tasks" class="text-xs text-slate-500 hover:underline">← Tasks</a>
    <h1 class="text-xl font-semibold mt-1 font-mono">{{ task.task_id }}</h1>
  </div>
  <button hx-delete="/api/tasks/{{ task.task_id }}"
          hx-confirm="Delete task {{ task.task_id }}?"
          hx-on::after-request="if (event.detail.successful) window.location.href='/tasks'"
          class="px-3 py-1.5 text-sm bg-red-600 text-white rounded hover:bg-red-700">
    Delete
  </button>
</div>

<div id="task-grid">
  {% include "_task_detail_grid.html" %}
</div>

<section class="bg-white rounded-lg border border-slate-200 p-5 mb-6">
  <div class="flex items-center justify-between mb-2">
    <h2 class="text-base font-semibold">Live worker log</h2>
    <span class="text-xs text-slate-400">filtered to this task; auto-refresh 2s</span>
  </div>
  <pre id="task-log"
       hx-get="/tasks/{{ task.task_id }}/log/partial"
       hx-trigger="load, every 2s"
       hx-swap="innerHTML"
       class="whitespace-pre-wrap text-xs font-mono bg-slate-900 text-slate-100 p-3 rounded h-64 overflow-y-auto"></pre>
</section>

<script>
(() => {
  const grid = document.getElementById('task-grid');
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const taskId = {{ task.task_id|tojson }};
  const url = `${proto}//${location.host}/ws/task/${encodeURIComponent(taskId)}`;
  let backoff = 1000;
  const connect = () => {
    const ws = new WebSocket(url);
    ws.onopen = () => { backoff = 1000; };
    ws.onmessage = (ev) => {
      grid.innerHTML = ev.data;
      if (window.htmx) htmx.process(grid);
    };
    ws.onclose = () => {
      setTimeout(connect, backoff);
      backoff = Math.min(backoff * 2, 10_000);
    };
    ws.onerror = () => ws.close();
  };
  connect();
})();
</script>
{% endblock %}
