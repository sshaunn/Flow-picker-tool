{% extends "base.html" %}
{% block title %}New task · Flow Harvester{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-xl font-semibold mb-4">New task</h1>

  <form action="/tasks/new" method="post" enctype="multipart/form-data"
        class="bg-white rounded-lg border border-slate-200 p-6 space-y-4">

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">SKU</label>
        <input type="text" name="sku_id" required
               class="w-full rounded border border-slate-300 px-3 py-2 text-sm"
               placeholder="sku_001">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Creative</label>
        <input type="text" name="creative_id" required
               class="w-full rounded border border-slate-300 px-3 py-2 text-sm"
               placeholder="creative_001">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Segment</label>
        <input type="text" name="segment_id" required
               class="w-full rounded border border-slate-300 px-3 py-2 text-sm"
               placeholder="A">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Prompt</label>
      <textarea name="video_prompt" rows="4" required
                class="w-full rounded border border-slate-300 px-3 py-2 text-sm font-mono"
                placeholder="A serene beach at sunset, gentle waves..."></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Target count</label>
        <input type="number" name="target_count" value="4" min="1" max="50" required
               class="w-full rounded border border-slate-300 px-3 py-2 text-sm">
        <p class="mt-1 text-xs text-slate-500">How many videos to harvest for this task.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Asset kind</label>
        <select name="asset_kind"
                class="w-full rounded border border-slate-300 px-3 py-2 text-sm">
          <option value="reference" selected>reference (Ingredients)</option>
          <option value="first_frame">first_frame</option>
          <option value="last_frame">last_frame</option>
          <option value="previous_segment_frame">previous_segment_frame</option>
          <option value="other">other</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Source images</label>
      <input type="file" name="assets" multiple accept="image/*" required
             class="w-full text-sm">
      <p class="mt-1 text-xs text-slate-500">
        Pick one or more images. They'll be copied into the managed assets folder.
      </p>
    </div>

    <div class="flex justify-end gap-2 pt-2">
      <a href="/tasks" class="px-3 py-1.5 text-sm text-slate-600 hover:text-slate-900">Cancel</a>
      <button type="submit" class="px-4 py-1.5 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">
        Create task
      </button>
    </div>
  </form>
</div>
{% endblock %}
