{% extends "base.html" %}
{% block title %}Dashboard · Flow Harvester{% endblock %}

{% block content %}
<div id="dashboard-grid" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  {% include "_dashboard_grid.html" %}
</div>

<script>
(() => {
  const grid = document.getElementById('dashboard-grid');
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws/dashboard`;

  let ws = null;
  let backoff = 1000;

  const connect = () => {
    ws = new WebSocket(url);
    ws.onopen = () => { backoff = 1000; };
    ws.onmessage = (ev) => {
      grid.innerHTML = ev.data;
      if (window.htmx) htmx.process(grid);
    };
    ws.onclose = () => {
      // Reconnect with exponential backoff capped at 10s.
      setTimeout(connect, backoff);
      backoff = Math.min(backoff * 2, 10_000);
    };
    ws.onerror = () => ws.close();
  };
  connect();
})();
</script>
{% endblock %}
